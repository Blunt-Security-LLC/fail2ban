[Definition]

failregex =

    # WebDAV and related authoring methods.
    # For a static HTML site, these are typically not needed and are often scanner noise.
    (?i)^<HOST> .* "(PROPFIND|PROPPATCH|MKCOL|COPY|MOVE|LOCK|UNLOCK|SEARCH|BIND|REBIND|UNBIND|ACL|REPORT|MKACTIVITY|CHECKOUT|MERGE|BASELINE-CONTROL|MKWORKSPACE|LABEL|VERSION-CONTROL|ORDERPATCH) [^\"]* HTTP/[0-9.]+" .*$

ignoreregex =
