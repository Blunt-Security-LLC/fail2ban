[Definition]

failregex =

    # Empty or missing User-Agent in combined log format
    (?i)^<HOST>\s+.*\s"[A-Z]+\s+[^\"]*"\s+\d+\s+\d+\s+"[^\"]*"\s+"-"\s*$
    (?i)^<HOST>\s+.*\s"[A-Z]+\s+[^\"]*"\s+\d+\s+\d+\s+"[^\"]*"\s+""\s*$

    # Minimal fake Mozilla signatures (often used by dumb bots)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* "Mozilla/[0-9]\.[0-9]"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* "Mozilla/5\.0"\s*$

    # Common scripted HTTP clients
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(Go-http-client|python-requests|python-urllib|python-httpx|libwww-perl|aiohttp|okhttp|curl|wget|libcurl|scrapy|httpclient|httpie|java/|apache-httpclient|winhttp|pycurl|restsharp|axios|node-fetch|undici).*"\s*$

    # Common scanner and fuzzing frameworks
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(zgrab|masscan|nmap|sqlmap|nikto|acunetix|nessus|dirbuster|gobuster|ffuf|feroxbuster|wpscan|whatweb|jaeles|nuclei|w3af|arachni|skipfish|commix).*"\s*$

    # Non-ASCII UA payloads are uncommon for normal browsers
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*[^ -~].*"\s*$

    # Impossible browser fingerprint combinations
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(MSIE|Trident/).*(Chrome/|Firefox/|OPR/|Edg/|CriOS/).*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(Firefox/).*(AppleWebKit/|Safari/).*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(Chrome/|CriOS/).*(Gecko/20100101|rv:[0-9]+).*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(Safari/).*(Firefox/|MSIE|Trident/).*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(OPR/).*(Edg/).*"\s*$

    # Known bot strings
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*Hello World.*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*libredtail-http.*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* "Keydrop\.io/.*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*TerraCotta.*"\s*$
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*xfa1.*"\s*$

ignoreregex =
