[Definition]

failregex =

    # Geo-based filtering (optional; higher false-positive risk)
    # Opera locale-based matching (classic and Chromium Opera UA formats)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(Opera/|OPR/).*(zh|zh-cn|zh-tw|ru|ja|ko|ar|fa|hi|th|tr|uk|bg|pl|cs|ro|hu|el|he|vi|id|ms|bn|ta|ur|sr|sk|lt|lv|et|sl|hr|mk|sq|sw|ko-kp).*"\s*$

    # Regional/language browser tokens (CN/RU-oriented)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(zh|zh-cn|zh-tw|zh-hans|zh-hant|ru|ru-ru|yabrowser|yowser|sputnikbrowser|qqbrowser|ucbrowser|2345explorer|metasr|lbbrowser|maxthon|sogoumobilebrowser).*"\s*$

    # Locale stuffing (multiple locale tokens in one UA)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(zh|ru|ja|ko|ar|fa|hi|th|tr|uk).*(zh|ru|ja|ko|ar|fa|hi|th|tr|uk).*(zh|ru|ja|ko|ar|fa|hi|th|tr|uk).*"\s*$

    # DPRK-specific browser/OS fingerprints (best-effort)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) [^\"]*" .* ".*(naenara|naenara-browser|red\s*star\s*os|redstar\s*os|samjiyon|ko-kp).*"\s*$

ignoreregex =
