[Definition]
allowipv6 = auto

failregex =
    # traversal / encoding / injection
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(\.\.|%2e|%2f|%%2e|%%2f|\\x5c|\\\\).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*\$\(.*\).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*invokefunction.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*XDEBUG_SESSION_START.*"

    # looking for any PHP URI to defend against shell hunting - this conf is for sites not running PHP or JS or Wordpress
#    (?i)^<HOST> .* "(GET|POST|HEAD) /.*\.php.*"

    # block trying for admin and login pages
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*admin.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(login|logon|config|setup|settings|gate|panel).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(phpmyadmin|pma|mysql|sql-admin|dbadmin).*"

    # Common Vulnerability Targets (Routers/IoT/Log4J)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/HNAP1.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/luci/.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/rpcform/.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/actuator/.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/druid/.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(boaform|cgi-bin|autodiscover|actuator).*"

    # Shell & Remote Execution attempts
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(shell|cmd|exec|eval|system|powershell).*"

    # Apple Mac noise
#    (?i)^<HOST> .* "(GET|POST|HEAD) .*apple-touch-icon.*"

    # wordpress / cms scanning (you are not running WP)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/wp-.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/wordpress/.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/joomla/.*"

    # aggressive CMS/framework URI probes (static site should never serve these)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(wp-admin|wp-login\.php|xmlrpc\.php|wp-json|wp-content|wp-includes).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(administrator|index\.php\?option=com_|com_content|com_users|joomla).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(drupal|sites/default|/user/login|/core/install\.php|/CHANGELOG\.txt).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(magento|/downloader/|/customer/account/login|/admin_/|/index\.php/admin).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(prestashop|/admin[0-9a-z_-]*|/modules/|/install-dev/).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(opencart|route=common/login|route=account/login|route=product/search).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(typo3|/typo3/|/typo3conf/|/typo3temp/).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(ghost|/ghost/|/ghost/api/).*"

    # cPanel / WHM / Webmail URI probes (separate section)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(cpanel|/cpanel/|/cpanel-login|/cpanelwebcall|/cpanelwebcall/).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(whm|/whm/|whmcs|/whmcs/|whm-server-status).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(webmail|/webmail/|roundcube|horde|squirrelmail|/rc/).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(:2082|:2083|:2086|:2087|:2095|:2096).*"

    # Upload page / file upload endpoint probes (static site should not expose these)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(/upload|/uploads|upload\.php|upload\.aspx|upload\.jsp|/file-upload|/fileupload|/uploader|/dropzone|/plupload|/fineuploader).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(multipart/form-data|qqfile=|filename=|chunk=|resumable|uploadify|upload_handler|uploadhandler).*"

    # Backup & Archive files (Scanners look for leaked zip files)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(backup|backup-.*|old|site|www|db)\.(zip|tar|gz|sql|rar|7z).*"

    # phpunit RCE paths (ALL variants)
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/vendor/.*/phpunit/.*/eval-stdin\.php.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/phpunit/.*/eval-stdin\.php.*"

    # sensitive files
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(\.env|\.git|\.ssh|\.htaccess|\.aws).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*(config\.php|web\.config|settings\.py|composer\.json).*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*config\.json.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*license\.txt.*"
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*phpinfo.*"

    # generic exploit-style PHP filenames
    (?i)^<HOST> .* "(GET|POST|HEAD|OPTIONS|PUT|PATCH|DELETE|TRACE|CONNECT|PRI) .*/[a-zA-Z0-9_-]{1,12}\.php(\?|$)"

ignoreregex =
